<html>
    <head>
        <link rel="stylesheet" href="/default.css?v=2">    
        <link rel="icon" type="image/x-ico" href="favicon.ico?v=1">
        <title> Learn web </title>
    </head>
    <body>
        <h1 class="header"> 
            Reversing VM-based protected binaries are hard asf. 
        </h1>
        <br>
        <div id="intro-display" class="intro-display-class">
            usage: /?name=x&age=y
        </div>
        <br>
        <p> You searched for: <strong id="search-display"> (search results will appear here)</strong></p>
        <form action="/" method="GET">
            <input type="text" name="search" placeholder="Search...">
            <button type="submit"> Search </button>
        </form>
        <br>
        <p id="message-status"> (message status will appear here) </p>
        <form id="message-form">
            <input type="text" name="message" placeholder="Message..." id="message-input" required>
            <button type="submit"> Send </button>
        </form>
        <br>
        <script>
            const params = new URLSearchParams(window.location.search);
            const name = params.get('name');
            const age = params.get('age');
            const search = params.get('search');
            if (name || age) {
                document.getElementById('intro-display').innerText = `You are ${name}, ${age} years old`;
            }
            if (search) {
                const display = document.getElementById('search-display');
                display.innerText = search;
            }
        </script>
        
        <script>
            const form = document.getElementById('message-form');
            const status = document.getElementById('message-status');
            form.addEventListener('submit', async (event) => {
                event.preventDefault();

                const data = new URLSearchParams(new FormData(form));
                console.log(data);
                try {
                    const response = await fetch('/node-api/send', {
                        method: 'POST',
                        body: data,
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded'
                        }
                    });
                    if (response.ok) {
                        const text = await response.text();
                        status.innerText = text;
                        document.getElementById('message-input').value = "";
                    } else {
                        status.innerText = "Error: could not send message";
                    }
                } catch (error) {
                    console.error("Error:", error);
                    status.innerText = "Error: could not send message"
                }
            })
        </script>
        <hr>
        <br>
        <button class="goto-hacker-class" onclick="goToHackers()">
            Go to hacker functions
        </button>   
        <br>
        <br>
        <button onclick="goToStack()"> Go to stack visualizer </button>     
        <script>
            function goToHackers() {
                window.location.href = "https://127.0.0.1/hacker";
            }
            function goToStack() {
                window.location.href = "https://127.0.0.1/stack";
            }

        </script>
    </body>
</html>
