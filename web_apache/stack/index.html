<html>
    <head>
        <link rel="stylesheet" href="../style.css">    
    </head>
    <body style="margin: 35px">
        <div id="stack-display-1">
            Stack will appear here    
        </div>
        <hr>
        <div id="stack-display-2">
            Other stack will appear here    
        </div>
        <!-- Object Literal Syntax -->
        <script>
            window.stack = {
                top: null,
                Push: function(v) {
                    const node = {
                        val: v,
                        bot: this.top
                    };
                    this.top = node;
                },
                Pop: function() {
                    if (!this.top)
                        return null;
                    const out = this.top.val;
                    this.top = this.top.bot;
                    return out;
                },
                Print: function() {
                    if (!this.top)
                        return console.log("Stack is empty");
                    console.log(`${this.top.val} <- top`);
                    let node = this.top.bot;
                    while (node !== null) {
                        console.log(`${node.val}`);
                        node = node.bot;
                    }  
                },
                Render: function(containerId) {
                    const container = document.getElementById(containerId);
                    if (!container)
                        return;
                    container.innerHTML = "";
                    topDiv = document.createElement('div');
                    topDiv.innerText = `Value: ${this.top.val} <- top`;
                    container.appendChild(topDiv);
                    let node = this.top.bot;
                    while (node !== null) {
                        const div = document.createElement('div');
                        div.innerText = `Value: ${node.val}`;
                        container.appendChild(div);
                        node = node.bot;
                    }
                }
            }
            window.stack.Push(100);
            window.stack.Push(200);
            window.stack.Push(300);
            window.stack.Print();
            window.stack.Render("stack-display-1");
        </script>
        <!-- Class/Constructor Syntax -->
        <script>
            class Stack {
                constructor() {
                    this.top = null;
                }
                Push (v) {
                    const node = {
                        val: v,
                        bot: this.top 
                    }
                    this.top = node;
                }    
                Pop() {
                    if (!this.top)
                        return null;
                    const out = this.top.val;
                    this.top = this.top.bot;
                    return out;
                }
                Print() {
                    if (!this.top)
                        return console.log("Stack is empty");
                    console.log(`${this.top.val} <- top`);
                    let node = this.top.bot;
                    while (node !== null) {
                        console.log(`${node.val}`);
                        node = node.bot;
                    }    
                }
                Render(containerId) {
                    const container = document.getElementById(containerId);
                    if (!container)
                        return;
                    container.innerHTML = "";
                    const topDiv = document.createElement('div');
                    topDiv.innerText = `Value: ${this.top.val} <- top`;
                    container.appendChild(topDiv);
                    let node = this.top.bot;
                    while (node !== null) {
                        const div = document.createElement('div');
                        div.innerText = `Value: ${node.val}`;
                        container.appendChild(div);
                        node = node.bot;
                    }
                }
            }
            const stack = new Stack();
            stack.Push(400);
            stack.Push(500);
            stack.Push(600);
            stack.Print();
            stack.Render('stack-display-2');
        </script>

        <script>
            const counter = (function() {
            let privateValue = 0;
            return {
                increment: function() {
                    privateValue++;
                    console.log(`Current Value: ${privateValue}`);
                },
                getValue: function() {
                    return privateValue;
                }
            };
        })();

        counter.increment(); // Prints 1
        counter.increment();
        console.log(counter.privateValue); // Prints "undefined" (Safe!)
        </script>
    </body>
</html>
