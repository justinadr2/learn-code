<html>
    <head>
        <link rel="stylesheet" href="/default.css?v=2">
    </head>
    <body>
        <input type="number" id="input-n" placeholder="Enter n">
        <br>
        <button onclick="fib_console()"> Print Console </button>
        <br>
        <button onclick="fib_page()"> Print Page </button>
        <hr>
        <div id="output">

        </div>
        <script>
            function fib_console() {
                const n = parseInt(document.getElementById('input-n').value);
                let a = 0;
                let b = 1;
                for (let i = 1; i <= n; i++) {
                    console.log(`${i}: ${a}`);
                    let c = a + b;
                    a = b;
                    b = c;
                }
            }
            function fib_page() {
                const input = document.getElementById('input-n');
                const n = parseInt(input.value);
                input.value = '';
                const parent = document.getElementById('output');
                parent.innerHTML = '';
                let i = 1;
                let a = 0;
                let b = 1;
                while (i <= n) {
                    const x = document.createElement('div');
                    x.innerText = `${i}: ${a}`;
                    parent.appendChild(x);
                    let c = a + b;
                    a = b;
                    b = c;
                    i++;
                }
            }
        </script>
    </body>
</html>
