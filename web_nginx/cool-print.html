<html lang="en">
<head>

</head>
<body>
    <input type="text" id="input">
    <button onclick="Print()">Print</button>
    <hr>
    <div id="holder"></div>
    <script>
        const con = document.getElementById('holder'); 
        const sleep = ms => new Promise(r => setTimeout(r, ms));
        async function Print() { 
            const input_id = document.getElementById('input');
            const input = input_id.value;
            const alpha = " nB&kO2V-cK7D@dQ%e+9AZ3fgS(LhiUjY5b#Rl0mWaE^oI4pqFr!sJt=P6)uNvXw8GM_$xC1*yzTH";
            let locked = "";
            let c = 0;
            for (let i = 0; i < input.length; i++) {
                const target = input[i];
                for (let j = 0; j < alpha.length; j++) {
                    const current = alpha[j];
                    if (current === target) {
                        locked += target;
                        con.innerText = locked;
                        break;
                    } else {
                        con.innerText = locked + current;
                    }
                    await sleep(17);

            }

        }
    </script>
</body>
